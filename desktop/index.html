<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iCode Desktop</title>
<style>
:root {
  --bg-primary: #1e1e2e;
  --bg-secondary: #181825;
  --bg-tertiary: #313244;
  --border: #45475a;
  --text-primary: #cdd6f4;
  --text-muted: #a6adc8;
  --text-dim: #6c7086;
  --accent: #89b4fa;
  --accent-hover: #74c7ec;
  --green: #a6e3a1;
  --yellow: #f9e2af;
  --red: #f38ba8;
  --cyan: #89dceb;
  --purple: #cba6f7;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg-primary); color: var(--text-primary);
  height: 100vh; display: flex; flex-direction: column;
}

/* Header */
.header {
  background: var(--bg-secondary); border-bottom: 1px solid var(--border);
  padding: 8px 16px; display: flex; align-items: center; gap: 12px;
  -webkit-app-region: drag; user-select: none;
}
.header .logo { font-weight: 600; font-size: 14px; color: var(--accent); }
.header .model-tag {
  font-size: 11px; background: var(--bg-tertiary); border: 1px solid var(--border);
  border-radius: 4px; padding: 2px 8px; color: var(--text-muted);
  -webkit-app-region: no-drag; cursor: pointer;
}
.header .mode-tag {
  font-size: 11px; border-radius: 4px; padding: 2px 8px;
  -webkit-app-region: no-drag;
}
.mode-agent { background: #1a3a2a; color: var(--green); }
.mode-plan { background: #1a2a3a; color: var(--accent); }
.mode-yolo { background: #3a1a1a; color: var(--red); }

.header select {
  -webkit-app-region: no-drag;
  background: var(--bg-tertiary); color: var(--text-primary);
  border: 1px solid var(--border); border-radius: 4px;
  padding: 4px 8px; font-size: 12px;
}

/* Messages */
.messages {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 16px;
}
.msg { display: flex; gap: 10px; max-width: 85%; animation: fadeIn 0.2s; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.assistant { align-self: flex-start; }
.msg.system { align-self: center; max-width: 95%; }

.msg-icon {
  width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600;
}
.msg.user .msg-icon { background: var(--accent); color: #1e1e2e; }
.msg.assistant .msg-icon { background: var(--cyan); color: #1e1e2e; }
.msg.system .msg-icon { background: var(--bg-tertiary); color: var(--text-dim); font-size: 10px; }

.msg-body {
  padding: 10px 14px; border-radius: 10px; font-size: 13px;
  line-height: 1.65; word-break: break-word;
}
.msg.user .msg-body { background: var(--bg-tertiary); border: 1px solid var(--border); }
.msg.assistant .msg-body { background: var(--bg-secondary); border: 1px solid var(--border); white-space: pre-wrap; }
.msg.system .msg-body {
  background: transparent; color: var(--text-dim); font-size: 12px;
  text-align: center; padding: 4px 14px;
}

.msg-body code {
  background: var(--bg-tertiary); padding: 2px 6px; border-radius: 3px;
  font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 12px;
}

.tool-tag {
  display: inline-block; font-size: 11px; padding: 2px 6px; margin: 4px 0;
  background: var(--yellow); color: #1e1e2e; border-radius: 3px;
}

/* Status Bar */
.status-bar {
  background: var(--bg-secondary); border-top: 1px solid var(--border);
  padding: 4px 16px; display: flex; align-items: center; gap: 12px;
  font-size: 12px; color: var(--text-muted);
}
.status-bar .sep { color: var(--text-dim); }
.status-tokens { color: var(--green); }
.status-cost { color: var(--yellow); }

/* Input */
.input-area {
  background: var(--bg-secondary); border-top: 1px solid var(--border);
  padding: 10px 16px; display: flex; gap: 10px; align-items: flex-end;
}
.input-area textarea {
  flex: 1; background: var(--bg-primary); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text-primary); resize: none;
  outline: none; padding: 8px 12px; font-size: 13px; font-family: inherit;
  line-height: 1.5; max-height: 120px;
}
.input-area textarea:focus { border-color: var(--accent); }
.input-area button {
  background: var(--accent); border: none; color: #1e1e2e;
  padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px;
  transition: background 0.15s; white-space: nowrap;
}
.input-area button:hover { background: var(--accent-hover); }
.input-area button:disabled { background: var(--border); color: var(--text-dim); cursor: default; }

/* Sidebar */
.sidebar { display: none; }
@media (min-width: 900px) {
  .layout { display: flex; flex: 1; overflow: hidden; }
  .sidebar { display: flex; flex-direction: column; width: 200px;
    background: var(--bg-secondary); border-right: 1px solid var(--border);
    padding: 12px; gap: 8px; }
  .sidebar h3 { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
  .sidebar .provider-item {
    font-size: 13px; padding: 6px 10px; border-radius: 6px; cursor: pointer;
    color: var(--text-primary);
  }
  .sidebar .provider-item:hover { background: var(--bg-tertiary); }
  .sidebar .provider-item.active { background: var(--bg-tertiary); color: var(--accent); }
  .chat-area { flex: 1; display: flex; flex-direction: column; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <span class="logo">iCode</span>
  <select id="modelSelect" class="model-tag">
    <option>deepseek-v4-flash</option>
    <option>deepseek-v4-pro</option>
    <option>glm-5</option>
    <option>glm-4-flash</option>
    <option>kimi-k2.7-code</option>
    <option>doubao-seed-2.1-pro</option>
    <option>hunyuan-turbos</option>
    <option>pangu-5.0-code</option>
    <option>scnet-code</option>
  </select>
  <span class="mode-tag mode-agent" id="modeTag" onclick="cycleMode()">agent</span>
  <span style="flex:1"></span>
</div>

<div class="layout">
  <div class="sidebar">
    <h3>Providers</h3>
    <div class="provider-item active" data-prov="deepseek" onclick="selectProvider('deepseek')">DeepSeek</div>
    <div class="provider-item" data-prov="zhipu" onclick="selectProvider('zhipu')">Zhipu GLM</div>
    <div class="provider-item" data-prov="kimi" onclick="selectProvider('kimi')">Kimi K2</div>
    <div class="provider-item" data-prov="volcengine" onclick="selectProvider('volcengine')">Doubao</div>
    <div class="provider-item" data-prov="tencent" onclick="selectProvider('tencent')">Hunyuan</div>
    <div class="provider-item" data-prov="huawei" onclick="selectProvider('huawei')">Pangu</div>
    <div class="provider-item" data-prov="scnet" onclick="selectProvider('scnet')">SCNET</div>
  </div>
  <div class="chat-area">
    <div class="messages" id="messages"></div>
    <div class="status-bar" id="statusBar">
      <span class="status-tokens">deepseek-v4-flash</span>
      <span class="sep">·</span>
      <span>0 tok</span>
      <span class="sep">·</span>
      <span class="status-cost">¥0.00</span>
    </div>
    <div class="input-area">
      <textarea id="input" placeholder="Type a message...  (Enter=send, Shift+Enter=newline)" rows="1" onkeydown="handleKey(event)"></textarea>
      <button id="sendBtn" onclick="send()">Send</button>
    </div>
  </div>
</div>

<script>
const models = {
  deepseek: ['deepseek-v4-flash','deepseek-v4-pro'],
  zhipu: ['glm-5','glm-4-flash'],
  kimi: ['kimi-k2.7-code','kimi-k2.6'],
  volcengine: ['doubao-seed-2.1-pro','doubao-seed-2.1-turbo'],
  tencent: ['hunyuan-turbos','hunyuan-t1'],
  huawei: ['pangu-5.0-pro','pangu-5.0-code'],
  scnet: ['scnet-chat','scnet-code'],
};

let state = {
  provider: 'deepseek',
  model: 'deepseek-v4-flash',
  mode: 'agent',
  messages: [],
  tokens: { prompt: 0, completion: 0 },
  streaming: false,
};

const providerMap = {
  deepseek:'DeepSeek', zhipu:'Zhipu GLM', kimi:'Kimi K2',
  volcengine:'Doubao', tencent:'Hunyuan', huawei:'Pangu', scnet:'SCNET'
};

function selectProvider(p) {
  state.provider = p;
  state.model = models[p][0];
  updateModelSelect();
  document.querySelectorAll('.provider-item').forEach(el => el.classList.toggle('active', el.dataset.prov === p));
}

function updateModelSelect() {
  const sel = document.getElementById('modelSelect');
  sel.innerHTML = models[state.provider].map(m => `<option>${m}</option>`).join('');
  sel.value = state.model;
  sel.onchange = () => { state.model = sel.value; };
}

function cycleMode() {
  const modes = ['plan','agent','yolo'];
  const i = modes.indexOf(state.mode);
  state.mode = modes[(i+1)%3];
  const tag = document.getElementById('modeTag');
  tag.textContent = state.mode;
  tag.className = 'mode-tag mode-' + state.mode;
}

function addMsg(role, content, tool) {
  state.messages.push({ role, content, tool, id: Date.now() });
  render();
}

function render() {
  const el = document.getElementById('messages');
  el.innerHTML = state.messages.map(m => {
    const icon = m.role === 'user' ? 'U' : m.role === 'assistant' ? 'i' : '·';
    const cls = 'msg ' + m.role;
    const toolHtml = m.tool ? `<span class="tool-tag">${m.tool}</span>` : '';
    return `<div class="${cls}"><div class="msg-icon">${icon}</div><div class="msg-body">${toolHtml}${escapeHtml(m.content)}</div></div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateStatus() {
  const t = state.tokens;
  const total = t.prompt + t.completion;
  const tokStr = total >= 1000 ? (total/1000).toFixed(1)+'K' : total;
  document.getElementById('statusBar').innerHTML = `
    <span class="status-tokens">${state.model}</span>
    <span class="sep">·</span>
    <span>${tokStr} tok</span>
    <span class="sep">·</span>
    <span class="status-cost">¥${(total * 0.00014).toFixed(4)}</span>
  `;
}

function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || state.streaming) return;

  addMsg('user', text);
  input.value = '';
  state.streaming = true;
  document.getElementById('sendBtn').disabled = true;

  // Simulate backend call (in production: talks to ./icode.exe server)
  setTimeout(() => {
    const response = generateResponse(text);
    addMsg('assistant', response);
    state.tokens.prompt += Math.ceil(text.length / 3);
    state.tokens.completion += Math.ceil(response.length / 3);
    updateStatus();
    state.streaming = false;
    document.getElementById('sendBtn').disabled = false;
  }, 600 + Math.random() * 800);
}

function generateResponse(input) {
  const lower = input.toLowerCase();

  if (lower.includes('sort') || lower.includes('排序')) {
    return `Here's a Go sorting example:

\`\`\`go
func SortSlice(s []int) []int {
    sort.Ints(s)
    return s
}

nums := []int{3, 1, 4, 1, 5, 9}
sorted := SortSlice(nums)
fmt.Println(sorted) // [1 1 3 4 5 9]
\`\`\`

The standard library \`sort\` package provides efficient O(n log n) sorting.`;
  }

  if (lower.includes('hello') || lower.includes('你好') || lower.includes('hi')) {
    return `Hello! I'm iCode Desktop.

I'm currently running in standalone mode (no backend server).

To connect to a real AI backend:
1. Build the server: \`go build -o icode.exe .\`
2. Start it: \`./icode.exe server\`
3. Refresh this page


Available commands: sort examples, Go tips, architecture questions.`;
  }

  if (lower.includes('go') || lower.includes('golang')) {
    return `Go tips for iCode:

**Concurrency**
\`\`\`go
go func() { /* async work */ }()
ch := make(chan string, 10)
\`\`\`

**Error handling**
\`\`\`go
if err != nil { return fmt.Errorf("op: %w", err) }
\`\`\`

**Interfaces** — accept interfaces, return structs.

iCode supports all these patterns natively in agent mode.`;
  }

  return `Got it! Here are some things I can help with:

- **Code generation** — Write functions, classes, modules
- **Code review** — Find bugs and suggest improvements
- **Architecture** — Design patterns, system design
- **Debugging** — Trace errors and fix issues


Try asking me to:
- "Write a REST API in Go"
- "Explain this SQL query"
- "Review this function for bugs"
- "Design a microservice architecture"`;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

// Init
document.getElementById('sendBtn').disabled = false;
updateModelSelect();
addMsg('system', 'Welcome to iCode Desktop — standalone mode');
addMsg('system', 'Model: ' + state.model + ' · Mode: ' + state.mode + ' · Providers: 9');
addMsg('system', 'Type a message to start. Connect the backend server for AI-powered responses.');
</script>
</body>
</html>
