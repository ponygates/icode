<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iCode Desktop</title>
<style>
/* ── OKLCH design tokens (perceptually uniform) ── */
:root {
  --accent:        oklch(68% 0.16 38);
  --accent-soft:   oklch(68% 0.16 38 / 0.15);
  --reasoning:     oklch(72% 0.14 295);
  --green:         oklch(78% 0.16 150);
  --red:           oklch(68% 0.20 25);
  --yellow:        oklch(82% 0.13 85);
  --cyan:          oklch(80% 0.12 200);
  --purple:        oklch(75% 0.14 310);
  --radius: 8px;
  --speed: 0.16s;
}
:root[data-theme="dark"] {
  --bg-0: oklch(18% 0.01 260);
  --bg-1: oklch(21% 0.012 260);
  --bg-2: oklch(25% 0.014 260);
  --bg-3: oklch(30% 0.015 260);
  --border: oklch(35% 0.02 260);
  --text: oklch(92% 0.01 260);
  --text-mut: oklch(75% 0.02 260);
  --text-dim: oklch(60% 0.02 260);
  --shadow: 0 12px 40px oklch(0% 0 0 / 0.45);
}
:root[data-theme="light"] {
  --bg-0: oklch(97% 0.005 260);
  --bg-1: oklch(99% 0.004 260);
  --bg-2: oklch(95% 0.006 260);
  --bg-3: oklch(90% 0.008 260);
  --border: oklch(85% 0.01 260);
  --text: oklch(25% 0.02 260);
  --text-mut: oklch(42% 0.02 260);
  --text-dim: oklch(58% 0.02 260);
  --shadow: 0 12px 40px oklch(0% 0 0 / 0.18);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg-0); color: var(--text);
  display: flex; flex-direction: column; overflow: hidden;
  font-size: 14px;
}

/* ── Title bar with session tabs ── */
.titlebar {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-1); border-bottom: 1px solid var(--border);
  padding: 6px 12px; user-select: none;
}
.brand { font-weight: 700; color: var(--accent); letter-spacing: 0.3px; font-size: 15px; white-space: nowrap; }
.brand .dot { color: var(--reasoning); }
.tabs { display: flex; gap: 6px; overflow-x: auto; flex: 1; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab {
  display: flex; align-items: center; gap: 6px; white-space: nowrap;
  background: var(--bg-2); border: 1px solid var(--border); border-radius: 999px;
  padding: 4px 10px; font-size: 12px; color: var(--text-mut); cursor: pointer;
  max-width: 200px; transition: background var(--speed), color var(--speed);
}
.tab:hover { background: var(--bg-3); }
.tab.active { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
.tab .x { opacity: 0.5; font-size: 11px; }
.tab .x:hover { opacity: 1; color: var(--red); }
.tb-btn {
  background: var(--bg-2); border: 1px solid var(--border); color: var(--text-mut);
  border-radius: 8px; padding: 5px 10px; cursor: pointer; font-size: 12px;
  transition: background var(--speed), color var(--speed);
}
.tb-btn:hover { background: var(--bg-3); color: var(--text); }

/* ── Workspace layout ── */
.workspace { flex: 1; display: flex; min-height: 0; }

/* Left sidebar */
.sidebar {
  width: 220px; background: var(--bg-1); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; padding: 10px; gap: 6px; overflow-y: auto;
}
.sb-section {
  font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px;
  color: var(--text-dim); margin: 8px 4px 2px;
}
.sb-list { display: flex; flex-direction: column; gap: 2px; }
.sb-item {
  display: flex; align-items: center; gap: 8px; padding: 7px 10px;
  border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--text-mut);
  transition: background var(--speed), color var(--speed);
}
.sb-item:hover { background: var(--bg-2); color: var(--text); }
.sb-item.active { background: var(--bg-2); color: var(--accent); }
.sb-item .ic { width: 16px; text-align: center; opacity: 0.8; }
.sb-item .label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Center thread */
.thread-wrap { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.messages { flex: 1; overflow-y: auto; padding: 18px 20px; display: flex; flex-direction: column; gap: 16px; }
.msg { display: flex; gap: 12px; max-width: 90%; animation: fade .18s ease; }
@keyframes fade { from { opacity: 0; transform: translateY(4px); } }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.assistant, .msg.tool { align-self: flex-start; }
.msg.system { align-self: center; max-width: 96%; }
.msg-icon {
  width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700;
}
.msg.user .msg-icon { background: var(--accent); color: var(--bg-0); }
.msg.assistant .msg-icon { background: var(--cyan); color: var(--bg-0); }
.msg.system .msg-icon { background: var(--bg-3); color: var(--text-dim); font-size: 11px; }
.msg.tool .msg-icon { background: var(--yellow); color: var(--bg-0); }
.msg-body {
  padding: 10px 14px; border-radius: 12px; line-height: 1.65;
  word-break: break-word; white-space: pre-wrap; font-size: 13.5px;
  border: 1px solid var(--border);
}
.msg.user .msg-body { background: var(--bg-3); }
.msg.assistant .msg-body { background: var(--bg-1); }
.msg.system .msg-body { background: transparent; color: var(--text-dim); text-align: center; padding: 2px 12px; font-size: 12px; border: none; }
.msg.tool .msg-body { background: var(--bg-1); font-family: 'Cascadia Code','Fira Code',ui-monospace,monospace; font-size: 12.5px; }
.tool-tag { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 7px; margin-bottom: 6px; background: var(--yellow); color: var(--bg-0); border-radius: 5px; }
.tool-args { color: var(--text-dim); font-size: 11px; margin-bottom: 5px; }
.tool-out { color: var(--text-mut); }
.thinking { color: var(--reasoning); font-style: italic; font-size: 12.5px; }

/* Composer */
.composer { position: relative; border-top: 1px solid var(--border); background: var(--bg-1); padding: 10px 14px 6px; }
.composer-row { display: flex; gap: 10px; align-items: flex-end; }
.composer textarea {
  flex: 1; background: var(--bg-0); border: 1px solid var(--border); border-radius: 12px;
  color: var(--text); resize: none; outline: none; padding: 10px 14px; font-size: 13.5px;
  font-family: inherit; line-height: 1.5; max-height: 140px;
}
.composer textarea:focus { border-color: var(--accent); }
.send-btn {
  background: var(--accent); border: none; color: var(--bg-0); font-weight: 700;
  padding: 10px 18px; border-radius: 10px; cursor: pointer; transition: filter var(--speed); white-space: nowrap;
}
.send-btn:hover { filter: brightness(1.08); }
.send-btn.stop { background: var(--red); }
.composer-hint { font-size: 11px; color: var(--text-dim); margin: 5px 2px 0; }

/* Autocomplete popover */
.ac-pop {
  position: absolute; left: 14px; right: 14px; bottom: 100%; margin-bottom: 6px;
  background: var(--bg-2); border: 1px solid var(--border); border-radius: 10px;
  box-shadow: var(--shadow); display: none; max-height: 220px; overflow-y: auto; padding: 4px; z-index: 30;
}
.ac-pop.show { display: block; }
.ac-item { display: flex; gap: 8px; align-items: baseline; padding: 7px 10px; border-radius: 7px; cursor: pointer; }
.ac-item.active, .ac-item:hover { background: var(--accent-soft); }
.ac-item .k { color: var(--accent); font-weight: 700; font-family: ui-monospace,monospace; }
.ac-item .d { color: var(--text-dim); font-size: 12px; }

/* Right context panel */
.context-panel {
  width: 248px; background: var(--bg-1); border-left: 1px solid var(--border);
  padding: 14px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px;
}
.cp-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-dim); }
.meter { display: flex; height: 10px; border-radius: 6px; overflow: hidden; background: var(--bg-3); }
.meter .seg-prompt { background: var(--accent); }
.meter .seg-cache { background: var(--green); }
.meter .seg-comp { background: var(--reasoning); }
.cp-stats { display: flex; flex-direction: column; gap: 8px; }
.stat-row { display: flex; justify-content: space-between; font-size: 12.5px; }
.stat-row .lbl { color: var(--text-mut); display: flex; align-items: center; gap: 6px; }
.stat-row .val { color: var(--text); font-variant-numeric: tabular-nums; }
.dot { width: 8px; height: 8px; border-radius: 3px; display: inline-block; }
.cp-divider { height: 1px; background: var(--border); }
.kv { display: flex; justify-content: space-between; font-size: 12.5px; }
.kv .k { color: var(--text-dim); }
.kv .v { color: var(--text-mut); }

/* Segmented status bar */
.statusbar {
  display: flex; align-items: center; gap: 4px; background: var(--bg-2);
  border-top: 1px solid var(--border); padding: 5px 12px; font-size: 12px; color: var(--text-mut);
  user-select: none;
}
.seg {
  display: flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 999px;
  cursor: pointer; transition: background var(--speed);
}
.seg:hover { background: var(--bg-3); }
.seg.theme-toggle { border: none; background: transparent; font: inherit; color: var(--text-mut); font-size: 14px; line-height: 1; padding: 3px 8px; }
.seg.theme-toggle:hover { background: var(--bg-3); color: var(--text); }
.seg .lbl { color: var(--text-dim); }
.seg .v { color: var(--text); font-variant-numeric: tabular-nums; }
.seg .v.good { color: var(--green); }
.seg .v.warn { color: var(--yellow); }
.seg .v.bad { color: var(--red); }
.sep { color: var(--text-dim); opacity: 0.5; }
.spacer { flex: 1; }

/* Modal */
.overlay { position: fixed; inset: 0; background: oklch(0% 0 0 / 0.55); display: none; align-items: center; justify-content: center; z-index: 100; }
.overlay.show { display: flex; }
.modal {
  background: var(--bg-1); border: 1px solid var(--border); border-radius: 14px;
  width: 480px; max-width: 92vw; padding: 22px; box-shadow: var(--shadow);
  max-height: 90vh; overflow-y: auto;
}
.modal h3 { font-size: 15px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.modal h3 .ic { color: var(--yellow); }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; color: var(--text-mut); margin-bottom: 6px; }
.field select, .field input {
  width: 100%; background: var(--bg-0); color: var(--text); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 10px; font-size: 13px; font-family: inherit; outline: none;
}
.field select:focus, .field input:focus { border-color: var(--accent); }
.modes { display: flex; gap: 8px; }
.mode-opt {
  flex: 1; text-align: center; padding: 9px 6px; border-radius: 9px; cursor: pointer;
  border: 1px solid var(--border); background: var(--bg-0); font-size: 12.5px; color: var(--text-mut);
  transition: all var(--speed);
}
.mode-opt small { display: block; font-size: 10px; color: var(--text-dim); margin-top: 2px; }
.mode-opt.sel { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
.modal .actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; }
.btn { border: none; border-radius: 9px; padding: 9px 16px; cursor: pointer; font-size: 13px; font-weight: 600; }
.btn.primary { background: var(--accent); color: var(--bg-0); }
.btn.ghost { background: var(--bg-3); color: var(--text-mut); }

/* API key manager */
.key-list { display:flex; flex-direction:column; gap:10px; max-height:300px; overflow-y:auto; padding-right:4px; margin-top:4px; }
.model-list { display:flex; flex-direction:column; gap:10px; max-height:260px; overflow-y:auto; padding-right:4px; margin-top:4px; }
.key-row { border:1px solid var(--border); border-radius:10px; padding:10px; background:var(--bg-1); }
.key-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; gap:8px; }
.key-name { font-weight:600; font-size:13px; }
.key-badge { font-size:11px; padding:2px 9px; border-radius:999px; font-weight:600; white-space:nowrap; }
.key-badge.set { background:color-mix(in oklab, var(--green) 18%, transparent); color:var(--green); }
.key-badge.unset { background:color-mix(in oklab, var(--red) 16%, transparent); color:var(--red); }
.key-inputs { display:flex; gap:6px; }
.key-inputs input { flex:1; min-width:0; background:var(--bg-0); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:8px 10px; font-size:13px; font-family:inherit; outline:none; }
.key-inputs input:focus, .key-add input:focus { border-color:var(--accent); }
.key-add { display:flex; gap:6px; margin-top:12px; }
.key-add input { flex:1; min-width:0; background:var(--bg-0); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:8px 10px; font-size:13px; font-family:inherit; outline:none; }
.key-hint { font-size:11px; color:var(--text-dim); margin-top:8px; line-height:1.5; }
.toast { position:fixed; left:50%; bottom:28px; transform:translateX(-50%); background:var(--bg-1); border:1px solid var(--border); color:var(--text); padding:10px 16px; border-radius:10px; font-size:13px; box-shadow:var(--shadow); opacity:0; pointer-events:none; transition:opacity var(--speed); z-index:200; }
.toast.show { opacity:1; }

/* Approval card (permission) */
.approval { border-left: 3px solid var(--yellow); }
.approval .perm-cmd {
  background: var(--bg-0); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 12px; font-family: ui-monospace,monospace; font-size: 12.5px;
  color: var(--text); word-break: break-word; margin-bottom: 12px;
}
.perm-btns { display: flex; gap: 8px; }
.perm-btns .btn { flex: 1; }
.b-allow { background: var(--green); color: var(--bg-0); }
.b-all { background: var(--accent); color: var(--bg-0); }
.b-deny { background: var(--red); color: var(--bg-0); }

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-track { background: transparent; }

/* ── Startup splash (LOGO) ── */
.splash {
  position: fixed; inset: 0; z-index: 500; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
  background: radial-gradient(130% 130% at 50% 28%, var(--bg-1), var(--bg-0));
  transition: opacity .55s ease; opacity: 1;
}
.splash.hide { opacity: 0; pointer-events: none; }
.splash .logo {
  font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; font-weight: 800;
  font-size: 62px; letter-spacing: 8px; line-height: 1; padding-left: 8px;
  background: linear-gradient(135deg, var(--accent), var(--reasoning));
  -webkit-background-clip: text; background-clip: text; color: transparent;
  filter: drop-shadow(0 6px 26px var(--accent-soft));
}
.splash .tag { color: var(--text-mut); font-size: 13px; letter-spacing: 4px; }
.splash .spin {
  width: 26px; height: 26px; margin-top: 6px; border-radius: 50%;
  border: 3px solid var(--border); border-top-color: var(--accent);
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Sidebar brand ── */
.sb-brand { font-weight: 800; color: var(--accent); font-size: 17px; letter-spacing: .5px; padding: 2px 6px 4px; display: flex; align-items: center; gap: 8px; }
.sb-brand .mark { width: 22px; height: 22px; border-radius: 7px; background: linear-gradient(135deg, var(--accent), var(--reasoning)); display:flex; align-items:center; justify-content:center; color: var(--bg-0); font-size: 13px; font-weight: 900; }
.sb-new {
  margin: 4px 4px 6px; padding: 8px; border-radius: 9px; border: 1px dashed var(--border);
  background: transparent; color: var(--text-mut); cursor: pointer; font-size: 13px; transition: all var(--speed);
}
.sb-new:hover { border-color: var(--accent); color: var(--accent); background: var(--bg-2); }

/* ── Settings two-pane ── */
.modal.settings { width: 800px; max-width: 95vw; display: flex; flex-direction: column; }
.settings-body { display: flex; min-height: 460px; }
.settings-nav {
  width: 214px; flex-shrink: 0; border-right: 1px solid var(--border);
  padding: 12px 10px; display: flex; flex-direction: column; gap: 3px; overflow-y: auto;
}
.nav-item {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  padding: 9px 11px; border-radius: 9px; cursor: pointer; font-size: 13px; color: var(--text-mut);
  transition: background var(--speed), color var(--speed);
}
.nav-item:hover { background: var(--bg-2); color: var(--text); }
.nav-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
.nav-item .nbadge { font-size: 10px; padding: 1px 7px; border-radius: 999px; font-weight: 600; }
.nav-item .nbadge.set { background: color-mix(in oklab, var(--green) 18%, transparent); color: var(--green); }
.nav-item .nbadge.unset { background: color-mix(in oklab, var(--red) 16%, transparent); color: var(--red); }
.nav-item .nbadge.custom { background: var(--accent-soft); color: var(--accent); }
.nav-h { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-dim); margin: 12px 6px 4px; }
.nav-add { margin-top: 8px; }
.settings-detail { flex: 1; padding: 16px 18px; overflow-y: auto; }
.detail-h { font-size: 16px; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.detail-sub { font-size: 12px; color: var(--text-dim); margin-bottom: 12px; }
.sub-h { font-size: 11px; text-transform: uppercase; letter-spacing: 1.1px; color: var(--text-dim); margin: 16px 0 8px; }
.mrow {
  border: 1px solid var(--border); border-radius: 10px; padding: 10px; background: var(--bg-1); margin-bottom: 8px;
}
.mrow .mhead { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
.mrow .mname { font-weight: 600; font-size: 13px; }
.mrow .mid { font-size: 11px; color: var(--text-dim); font-family: ui-monospace, monospace; }
.mrow .mbadge { font-size: 10px; padding: 1px 8px; border-radius: 999px; }
.mrow .mbadge.custom { background: var(--accent-soft); color: var(--accent); }
.mrow .mbadge.builtin { background: var(--bg-3); color: var(--text-mut); }
.mrow .minputs { display: flex; gap: 6px; }
.mrow .minputs input { flex: 1; min-width: 0; }
.inline-btns { display: flex; gap: 6px; }
.mini { padding: 7px 12px; font-size: 12px; border-radius: 8px; }
.row2 { display: flex; gap: 8px; margin-top: 10px; }
.row2 > * { flex: 1; min-width: 0; }
.danger { color: var(--red); }
.danger:hover { background: color-mix(in oklab, var(--red) 16%, transparent); }
</style>
</head>
<body>

<div class="splash" id="splash">
  <div class="logo">iCODE</div>
  <div class="tag">AI CODING AGENT</div>
  <div class="spin"></div>
</div>

<div class="titlebar">
  <span class="brand">◆<span class="dot"> i</span>Code</span>
  <div class="tabs" id="tabs"></div>
  <button class="tb-btn" id="newChat">+ 新会话</button>
  <button class="tb-btn" id="openSettings" title="设置">⚙</button>
</div>

<div class="workspace">
  <aside class="sidebar">
    <div class="sb-brand"><span class="mark">i</span> iCode</div>
    <button class="sb-new" id="sbNew">＋ 新建会话</button>
    <div class="sb-section">会话</div>
    <div class="sb-list" id="sessionList"></div>
  </aside>

  <main class="thread-wrap">
    <div class="messages" id="messages"></div>
    <div class="composer">
      <div class="ac-pop" id="acPop"></div>
      <div class="composer-row">
        <textarea id="input" rows="1" placeholder="输入消息…  (Enter 发送 · Shift+Enter 换行 · / 命令 · @ 提及)"></textarea>
        <button class="send-btn" id="sendBtn">发送</button>
      </div>
      <div class="composer-hint">Enter 发送 · Shift+Enter 换行 · 输入 / 查看命令 · agent 模式工具调用将弹出授权</div>
    </div>
  </main>

  <aside class="context-panel">
    <div class="cp-title">上下文</div>
    <div class="meter" id="meter">
      <div class="seg-prompt" style="width:0%"></div>
      <div class="seg-cache" style="width:0%"></div>
      <div class="seg-comp" style="width:0%"></div>
    </div>
    <div class="cp-stats">
      <div class="stat-row"><span class="lbl"><span class="dot" style="background:var(--accent)"></span>提示词</span><span class="val" id="stPrompt">0</span></div>
      <div class="stat-row"><span class="lbl"><span class="dot" style="background:var(--green)"></span>缓存命中</span><span class="val" id="stCache">0</span></div>
      <div class="stat-row"><span class="lbl"><span class="dot" style="background:var(--reasoning)"></span>补全</span><span class="val" id="stComp">0</span></div>
    </div>
    <div class="cp-divider"></div>
    <div class="kv"><span class="k">缓存率</span><span class="v" id="stCacheRate">0%</span></div>
    <div class="kv"><span class="k">本次成本</span><span class="v" id="stCost">¥0.0000</span></div>
    <div class="kv"><span class="k">累计 Tokens</span><span class="v" id="stTotal">0</span></div>
    <div class="cp-divider"></div>

<script>
// ── Model registry fetched from backend ──
let MODELS = [];           // [{id, provider, name, plan}]
let PROVIDERS = [];        // [{name, label}]
const SLASH = [
  { k: '/help', d: '显示帮助' },
  { k: '/model', d: '切换模型（打开设置）' },
  { k: '/provider', d: '切换提供商（打开设置）' },
  { k: '/mode', d: '切换权限模式' },
  { k: '/config', d: '打开设置' },
  { k: '/keys', d: '管理 API 密钥（打开设置）' },
  { k: '/sessions', d: '列出会话' },
  { k: '/resume', d: '恢复会话' },
  { k: '/clear', d: '清空当前会话' },
  { k: '/compact', d: '压缩上下文' },
  { k: '/cost', d: '显示成本' },
  { k: '/exit', d: '退出' },
];
// Slash commands that should trigger a UI action instead of being sent to the model.
const UI_SLASH = { '/config':'openSettings', '/keys':'openKeys', '/model':'openModel', '/provider':'openProvider' };

const state = {
  provider: 'deepseek',
  model: 'deepseek-v4-flash',
  mode: 'agent',
  theme: 'dark',
  sessionId: null,
  sessions: [],          // open tabs: [{id, title, active}]
  tokens: { prompt: 0, completion: 0, cache: 0, cost: 0, total: 0 },
  streaming: false,
  activeAssistant: null,
  currentToolBody: null,
  pendingPerm: null,
  jobs: 0,
  cwd: '—',
};

const $ = (id) => document.getElementById(id);
function esc(s){ return (s||'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function truncate(s, n){ return s.length > n ? s.slice(0, n) + '…' : s; }
function scrollDown(){ const el = $('messages'); el.scrollTop = el.scrollHeight; }

// ── Message DOM helpers ──
function newMsgEl(role, icon){
  const wrap = document.createElement('div'); wrap.className = 'msg ' + role;
  const ic = document.createElement('div'); ic.className = 'msg-icon'; ic.textContent = icon;
  const body = document.createElement('div'); body.className = 'msg-body';
  wrap.append(ic, body); $('messages').appendChild(wrap);
  return { wrap, body };
}
function addUser(t){ const {body} = newMsgEl('user','U'); body.textContent = t; scrollDown(); }
function addSystem(t){ const {body} = newMsgEl('system','·'); body.textContent = t; scrollDown(); }
function addAssistant(t){ const {body} = newMsgEl('assistant','i'); body.textContent = t || ''; state.activeAssistant = body; scrollDown(); return body; }
function addTool(name, args){
  const wrap = newMsgEl('tool','»').wrap;
  const body = wrap.querySelector('.msg-body');
  const tag = document.createElement('div'); tag.className = 'tool-tag'; tag.textContent = name; body.appendChild(tag);
  if (args){ const a = document.createElement('div'); a.className = 'tool-args';
    try { a.textContent = truncate(JSON.stringify(JSON.parse(args)), 160); } catch { a.textContent = truncate(args, 160); }
    body.appendChild(a); }
  const out = document.createElement('div'); out.className = 'tool-out'; body.appendChild(out);
  state.currentToolBody = out; scrollDown();
}
function appendAssistant(t){ if(!state.activeAssistant) addAssistant(t); else state.activeAssistant.textContent += t; scrollDown(); }
function appendTool(t){ if(state.currentToolBody) state.currentToolBody.textContent += t; scrollDown(); }

// ── Context panel / status bar ──
function updateContext(){
  const t = state.tokens;
  const sum = t.prompt + t.completion;
  const cacheRate = sum > 0 ? t.cache / sum : 0;
  $('stPrompt').textContent = t.prompt.toLocaleString();
  $('stCache').textContent = t.cache.toLocaleString();
  $('stComp').textContent = t.completion.toLocaleString();
  $('stCacheRate').textContent = (cacheRate*100).toFixed(0) + '%';
  $('stCost').textContent = '¥' + t.cost.toFixed(4);
  $('stTotal').textContent = t.total.toLocaleString();
  $('stModel').textContent = state.model;
  $('stMode').textContent = state.mode;
  // meter
  const mp = sum > 0 ? (t.prompt - t.cache)/sum*100 : 0;
  const mc = sum > 0 ? t.cache/sum*100 : 0;
  const mm = sum > 0 ? t.completion/sum*100 : 0;
  document.querySelector('.seg-prompt').style.width = mp + '%';
  document.querySelector('.seg-cache').style.width = mc + '%';
  document.querySelector('.seg-comp').style.width = mm + '%';
  // status bar
  $('sbModel').textContent = state.model;
  $('sbCache').textContent = (cacheRate*100).toFixed(0) + '%';
  $('sbCache').className = 'v ' + (cacheRate > 0.5 ? 'good' : cacheRate > 0.2 ? 'warn' : 'bad');
  $('sbCost').textContent = '¥' + (t.cost).toFixed(2);
  $('sbTokens').textContent = t.total.toLocaleString();
  $('sbMode').textContent = state.mode;
  $('sbProvider').textContent = state.provider;
  $('sbJobs').textContent = state.jobs;
  $('sbCwd').textContent = (state.cwd && state.cwd !== '—') ? truncate(state.cwd, 30) : '—';
}

// ── Tabs / sessions ──
function renderTabs(){
  const el = $('tabs'); el.innerHTML = '';
  state.sessions.forEach(s => {
    const t = document.createElement('div'); t.className = 'tab' + (s.active ? ' active' : '');
    const label = document.createElement('span'); label.textContent = s.title; t.appendChild(label);
    const x = document.createElement('span'); x.className = 'x'; x.textContent = '✕';
    x.onclick = (e) => { e.stopPropagation(); closeTab(s.id); };
    t.appendChild(x);
    t.onclick = () => switchTab(s.id);
    el.appendChild(t);
  });
}
function activeSession(){ return state.sessions.find(s => s.active); }
function switchTab(id){
  state.sessions.forEach(s => s.active = (s.id === id));
  state.sessionId = id;
  renderTabs(); renderSidebarSessions();
  loadSession(id);
}
function closeTab(id){
  const idx = state.sessions.findIndex(s => s.id === id);
  if (idx < 0) return;
  state.sessions.splice(idx, 1);
  if (state.sessions.length === 0) newSession();
  else { const next = state.sessions[Math.max(0, idx-1)]; switchTab(next.id); }
}
function newSession(){
  const id = 'web-' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  const s = { id, title: '新会话', active: true };
  state.sessions.forEach(x => x.active = false);
  state.sessions.push(s); state.sessionId = id;
  renderTabs(); renderSidebarSessions();
  $('messages').innerHTML = '';
  addSystem('新会话已创建 · 模型 ' + state.model + ' · 模式 ' + state.mode);
}
function loadSession(id){
  $('messages').innerHTML = '';
  fetch('/api/sessions/' + encodeURIComponent(id)).then(r => r.ok ? r.json() : null).then(sess => {
    if (!sess || !sess.messages) { addSystem('（空会话）'); return; }
    sess.messages.forEach(m => {
      if (m.role === 'user') addUser(m.content);
      else if (m.role === 'assistant') addAssistant(m.content);
      else if (m.role === 'tool') { addTool((m.tool_calls&&m.tool_calls[0]&&m.tool_calls[0].name)||'tool', ''); if(state.currentToolBody) state.currentToolBody.textContent = m.content; }
      else addSystem(m.content);
    });
  }).catch(() => addSystem('加载会话失败'));
}

// ── Sidebar ──
function renderSidebarSessions(){
  const el = $('sessionList'); el.innerHTML = '';
  state.sessions.forEach(s => {
    const it = document.createElement('div'); it.className = 'sb-item' + (s.active ? ' active' : '');
    it.innerHTML = '<span class="ic">💬</span><span class="label">' + esc(s.title) + '</span>';
    it.onclick = () => switchTab(s.id);
    el.appendChild(it);
  });
}
// ── Chat SSE ──
async function streamChat(text){
  const body = { session_id: state.sessionId, content: text, model: state.model, provider: state.provider };
  let resp;
  try { resp = await fetch('/api/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) }); }
  catch(e){ addSystem('连接后端失败: ' + e.message); return; }
  if (!resp.ok){ addSystem('后端错误: HTTP ' + resp.status); return; }
  const reader = resp.body.getReader(); const dec = new TextDecoder(); let buf = '';
  const toolRe = /^\s*\[Tool:\s*([^\]]+)\]\s*/;
  while (true){
    const { done, value } = await reader.read(); if (done) break;
    buf += dec.decode(value, { stream: true });
    let idx;
    while ((idx = buf.indexOf('\n\n')) >= 0){
      const chunk = buf.slice(0, idx); buf = buf.slice(idx+2);
      const line = chunk.split('\n').find(l => l.startsWith('data:')); if (!line) continue;
      const json = line.slice(5).trim(); if (!json) continue;
      let ev; try { ev = JSON.parse(json); } catch { continue; }
      handleEvent(ev);
    }
  }
}
function handleEvent(ev){
  switch (ev.type){
    case 'text': {
      const c = ev.content || ''; const m = c.match(toolRe);
      if (m) appendTool(c.slice(m[0].length)); else appendAssistant(c);
      break;
    }
    case 'tool_use':
      state.activeAssistant = null; addTool(ev.tool_call.name, ev.tool_call.arguments); state.jobs++; $('sbJobs').textContent = state.jobs; break;
    case 'permission':
      showPermission(ev.permission); break;
    case 'done':
      state.jobs = 0; $('sbJobs').textContent = 0;
      if (ev.meta && ev.meta.usage){
        const u = ev.meta.usage;
        state.tokens.prompt += u.prompt_tokens || 0;
        state.tokens.completion += u.completion_tokens || 0;
        state.tokens.cache += u.cache_hit_tokens || 0;
        state.tokens.total += (u.prompt_tokens||0) + (u.completion_tokens||0);
        state.tokens.cost += (state.tokens.total * 0.00002);
        updateContext();
      }
      break;
    case 'error':
      addSystem('错误: ' + (ev.content || 'unknown')); break;
  }
}

function send(){
  const input = $('input'); const text = input.value.trim();
  if (!text || state.streaming) return;
  // Intercept UI-triggering slash commands.
  const tok = text.split(/\s+/)[0].toLowerCase();
  if (UI_SLASH[tok]){ runUISlash(tok); input.value=''; autoGrow(); return; }
  if (!state.sessionId) newSession();
  addUser(text); input.value = ''; autoGrow();
  state.streaming = true; setBtnStop(true);
  state.activeAssistant = null; state.currentToolBody = null;
  // Resolve provider + model_id from the selected model entry (custom models
  // may belong to a different provider than the default).
  const mm = MODELS.find(m => m.id === state.model) || {};
  const provider = mm.provider || state.provider;
  const modelID = mm.model_id || state.model;
  // ensure session exists server-side
  fetch('/api/sessions', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ id: state.sessionId, model_id: modelID, provider_name: provider, title: text.slice(0,40) }) })
    .catch(()=>{})
    .finally(() => streamChat(text).finally(() => { state.streaming = false; setBtnStop(false); state.activeAssistant=null; state.currentToolBody=null; }));
}
function openProvider(){ openSettings('provider'); }
function openModel(){ openSettings(); setTimeout(() => { const e = $('setModel'); if (e) e.focus(); }, 60); }
function openKeys(){ openSettings('provider'); }
function runUISlash(tok){
  const fn = UI_SLASH[tok];
  if (fn === 'openSettings'){ openSettings(); }
  else if (fn === 'openKeys'){ openProvider(); }
  else if (fn === 'openModel'){ openModel(); }
  else if (fn === 'openProvider'){ openProvider(); }
}
function setBtnStop(stop){
  const b = $('sendBtn'); b.textContent = stop ? '停止' : '发送'; b.classList.toggle('stop', stop);
}
function stopChat(){
  if (state.sessionId) fetch('/api/chat/stop', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ session_id: state.sessionId }) }).catch(()=>{});
}

// ── Permission ──
function showPermission(req){
  state.pendingPerm = req;
  $('permCmd').textContent = req.prompt || ((req.tool||'工具') + ' 请求执行');
  $('permModal').classList.add('show');
}
function respondPerm(decision){
  const req = state.pendingPerm; $('permModal').classList.remove('show'); state.pendingPerm = null;
  if (!req) return;
  fetch('/api/permission/respond', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ request_id: req.request_id, decision }) }).catch(()=>{});
}
document.addEventListener('keydown', e => {
  if (state.pendingPerm){
    if (e.key==='y'||e.key==='Y'){ e.preventDefault(); respondPerm('allow'); }
    else if (e.key==='a'||e.key==='A'){ e.preventDefault(); respondPerm('allow_all'); }
    else if (e.key==='n'||e.key==='N'){ e.preventDefault(); respondPerm('deny'); }
  }
});

// ── Settings modal (provider → model) ──
let providerKeys = [];   // [{name, key_set, api_base}]
let customModels = [];   // [{id, provider, model_id, name, custom}]

const PROVIDER_LABELS = { deepseek:'DeepSeek', zhipu:'Zhipu GLM', kimi:'Kimi K2', volcengine:'Doubao', tencent:'Hunyuan', huawei:'Pangu', scnet:'SCNET', openrouter:'OpenRouter', anthropic:'Anthropic' };

function openSettings(nav){
  // Load provider + model data, then render the appropriate pane. The general
  // pane builds its own controls (setModel/setTheme/setLang/setModes) inside
  // renderGeneral, so we must not touch them before that.
  Promise.all([loadKeysData(), loadCustomModelsData()]).then(() => {
    renderProviderNav();
    if (nav === 'provider') selectProvider(state.provider);
    else if (nav === 'new') selectProvider('__new__');
    else renderGeneral();
    $('settingsModal').classList.add('show');
  });
}
function loadKeysData(){
  return fetch('/api/config/keys').then(r => r.ok ? r.json() : null).then(d => { providerKeys = (d && d.providers) || []; }).catch(() => { providerKeys = []; });
}
function loadCustomModelsData(){
  return fetch('/api/config/models').then(r => r.ok ? r.json() : null).then(d => { customModels = (d && d.models) || []; }).catch(() => { customModels = []; });
}
// All providers = built-in (from MODELS) ∪ custom (from providerKeys).
function allProviders(){
  const set = {};
  MODELS.forEach(m => { if (m.provider) set[m.provider] = true; });
  (providerKeys||[]).forEach(k => { set[k.name] = true; });
  return Object.keys(set).map(name => {
    const k = (providerKeys||[]).find(x => x.name === name);
    return { name, label: PROVIDER_LABELS[name]||name, key_set: k ? !!k.key_set : false, custom: k ? !MODELS.some(m=>m.provider===name) : false };
  });
}
function renderProviderNav(){
  const list = $('providerNavList'); list.innerHTML = '';
  allProviders().forEach(p => {
    const it = document.createElement('div'); it.className = 'nav-item'; it.dataset.provider = p.name;
    const badge = p.key_set ? '<span class="nbadge set">已配置</span>'
      : (p.custom ? '<span class="nbadge custom">自定义</span>' : '<span class="nbadge unset">未配置</span>');
    it.innerHTML = `<span>${esc(p.label)}</span>${badge}`;
    it.onclick = () => selectProvider(p.name);
    list.appendChild(it);
  });
}
function setActiveNav(sel){
  document.querySelectorAll('#settingsNav .nav-item').forEach(el => el.classList.toggle('active', el === sel));
}
function renderGeneral(){
  setActiveNav(document.querySelector('#settingsNav .nav-item[data-nav="general"]'));
  $('settingsDetail').innerHTML = `
    <div class="detail-h">⚙ 通用设置</div>
    <div class="field"><label>默认模型</label><select id="setModel"></select></div>
    <div class="field"><label>权限模式</label>
      <div class="modes" id="setModes">
        <div class="mode-opt" data-mode="plan">plan<small>仅规划，不改动</small></div>
        <div class="mode-opt" data-mode="agent">agent<small>需授权</small></div>
        <div class="mode-opt" data-mode="yolo">yolo<small>全部放行</small></div>
        <div class="mode-opt" data-mode="default">default<small>默认</small></div>
      </div>
    </div>
    <div class="field"><label>主题</label>
      <select id="setTheme">
        <option value="auto">auto（跟随系统）</option>
        <option value="dark">dark（深色）</option>
        <option value="light">light（浅色）</option>
      </select>
    </div>
    <div class="field"><label>语言</label>
      <select id="setLang">
        <option value="zh-CN">简体中文</option>
        <option value="zh-TW">繁體中文</option>
        <option value="en">English</option>
      </select>
    </div>
    <div class="key-hint">模型与厂商密钥在左侧「厂商 / 模型」中管理。点击厂商可为其增加、修改、删除模型。</div>`;
  $('setModel').innerHTML = MODELS.map(m => `<option value="${m.id}">${esc(m.name)} (${m.provider})${m.custom?' ★':''}</option>`).join('');
  $('setModel').value = state.model;
  $('setTheme').value = state.theme;
  $('setLang').value = (currentLang || 'zh-CN');
  document.querySelectorAll('#setModes .mode-opt').forEach(o => o.classList.toggle('sel', o.dataset.mode === state.mode));
  document.querySelectorAll('#setModes .mode-opt').forEach(o => o.onclick = () => {
    document.querySelectorAll('#setModes .mode-opt').forEach(x => x.classList.remove('sel')); o.classList.add('sel');
  });
}
function cssEsc(s){ return (s||'').replace(/"/g,'\\"'); }
function selectProvider(name){
  if (name === '__new__'){ renderAddProvider(); return; }
  const el = document.querySelector(`#settingsNav .nav-item[data-provider="${cssEsc(name)}"]`);
  setActiveNav(el);
  const p = allProviders().find(x => x.name === name); if (!p) return;
  renderProviderDetail(p);
}
function renderProviderDetail(p){
  const models = providerModels(p.name);
  const builtinCount = models.filter(m => !m.custom).length;
  const customCount = models.filter(m => m.custom).length;
  const baseVal = esc((providerKeys.find(k=>k.name===p.name)||{}).api_base||'');
  $('settingsDetail').innerHTML = `
    <div class="detail-h">◆ ${esc(p.label)}</div>
    <div class="detail-sub">共 ${models.length} 个模型（内置 ${builtinCount} · 自定义 ${customCount}）${p.custom?' · 自定义厂商':''}</div>
    <div class="sub-h">API 密钥</div>
    <div class="key-inputs">
      <input id="pvKey" type="password" placeholder="API Key" />
      <input id="pvBase" placeholder="Base URL（可选）" value="${baseVal}" />
      <button class="btn" id="pvSaveKey">保存</button>
    </div>
    <div class="key-hint">粘贴该厂商的 API Key 后保存；已保存的密钥不会回显。</div>
    <div class="sub-h">模型 <button class="btn mini" id="pvAddModelBtn" style="float:right">＋ 新增模型</button></div>
    <div id="pvModels" class="model-list"></div>
    <div class="row2" id="pvAddRow" style="display:none">
      <input id="pvNewId" placeholder="模型 ID，如 gpt-4o" />
      <input id="pvNewName" placeholder="显示名称（可选）" />
      <button class="btn mini" id="pvNewAdd">添加</button>
    </div>
    ${p.custom ? '<div class="key-hint" style="margin-top:14px"><button class="btn ghost danger" id="pvDel">删除该厂商</button> 删除厂商会同时移除其自定义模型。</div>' : ''}
  `;
  $('pvSaveKey').onclick = () => saveProviderKey(p.name);
  $('pvAddModelBtn').onclick = () => { $('pvAddRow').style.display = 'flex'; $('pvNewId').focus(); };
  $('pvNewAdd').onclick = () => addModelForProvider(p.name);
  if (p.custom) $('pvDel').onclick = () => deleteProvider(p.name);
  renderProviderModels(p);
}
function providerModels(provider){
  const builtin = MODELS.filter(m => m.provider === provider).map(m => ({ id:m.id, provider, model_id:m.model_id||m.id, name:m.name||m.id, custom:false }));
  const custom = customModels.filter(m => m.provider === provider).map(m => ({ id:m.id, provider, model_id:m.model_id, name:m.name||m.model_id, custom:true }));
  return builtin.concat(custom);
}
function renderProviderModels(p){
  const models = providerModels(p.name);
  const el = $('pvModels');
  if (!models.length){ el.innerHTML = '<div class="key-hint">该厂商下暂无模型，点击「＋ 新增模型」添加。</div>'; return; }
  el.innerHTML = models.map(m => `
    <div class="mrow" data-id="${esc(m.id)}">
      <div class="mhead">
        <span class="mname">${esc(m.name)}</span>
        <span class="mbadge ${m.custom?'custom':'builtin'}">${m.custom?'自定义':'内置'}</span>
      </div>
      <div class="mid">${esc(m.model_id)}</div>
      <div class="minputs" style="margin-top:8px">
        <input class="mvname" value="${esc(m.name)}" placeholder="显示名称" />
        <button class="btn mini" data-act="mvsave">${m.custom?'保存':'改名'}</button>
        ${m.custom?'<button class="btn ghost mini" data-act="mvdel">删除</button>':''}
      </div>
    </div>`).join('');
  el.querySelectorAll('.mrow').forEach(row => {
    row.querySelector('[data-act="mvsave"]').onclick = () => saveModelForProvider(p.name, row);
    const del = row.querySelector('[data-act="mvdel"]');
    if (del) del.onclick = () => deleteModelForProvider(row.dataset.id);
  });
}
function saveProviderKey(name){
  const key = $('pvKey').value;
  const base = $('pvBase').value.trim();
  if (!key && !base){ toast('请输入 Key 或 Base URL'); return; }
  fetch('/api/config/provider', { method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ name, api_key:key, api_base:base }) })
    .then(r => r.ok ? r.json() : Promise.reject(new Error('save failed')))
    .then(() => {
      const k = providerKeys.find(x=>x.name===name);
      if(k){ k.key_set=true; if(base) k.api_base=base; } else providerKeys.push({ name, key_set:true, api_base:base });
      $('pvKey').value=''; renderProviderNav(); toast('已保存 '+name);
    })
    .catch(() => toast('保存失败'));
}
function addModelForProvider(provider){
  const modelId = $('pvNewId').value.trim();
  const name = $('pvNewName').value.trim();
  if (!modelId){ toast('请填写模型 ID'); return; }
  fetch('/api/config/model', { method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ provider, model_id: modelId, name: name || modelId, custom: true }) })
    .then(r => r.ok ? r.json() : Promise.reject(new Error('add failed')))
    .then(() => { $('pvNewId').value=''; $('pvNewName').value=''; $('pvAddRow').style.display='none'; reloadModelsThen(() => selectProvider(provider)); toast('已新增模型 '+modelId); })
    .catch(() => toast('新增失败'));
}
function saveModelForProvider(provider, row){
  const id = row.dataset.id;
  const name = row.querySelector('.mvname').value.trim();
  const m = customModels.find(x => x.id === id);
  const payload = m ? Object.assign({}, m, { name }) : { id, provider, model_id: id.split('/').slice(1).join('/')||id, name, custom:true };
  fetch('/api/config/model', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) })
    .then(r => r.ok ? r.json() : Promise.reject(new Error('save failed')))
    .then(() => { reloadModelsThen(() => selectProvider(provider)); toast('已保存 '+name); })
    .catch(() => toast('保存失败'));
}
function deleteModelForProvider(id){
  fetch('/api/config/model?id=' + encodeURIComponent(id), { method:'DELETE' })
    .then(r => r.ok ? r.json() : Promise.reject(new Error('del failed')))
    .then(() => { const p = (customModels.find(m=>m.id===id)||{}).provider; reloadModelsThen(() => selectProvider(p)); toast('已删除'); })
    .catch(() => toast('删除失败'));
}
function deleteProvider(name){
  fetch('/api/config/provider?name=' + encodeURIComponent(name), { method:'DELETE' })
    .then(r => r.ok ? r.json() : Promise.reject(new Error('del failed')))
    .then(() => { reloadModelsThen(() => renderGeneral()); toast('已删除厂商 '+name); })
    .catch(() => toast('删除失败'));
}
function renderAddProvider(){
  setActiveNav($('addProviderBtn'));
  $('settingsDetail').innerHTML = `
    <div class="detail-h">＋ 新增厂商</div>
    <div class="detail-sub">添加一个新的模型厂商（需提供 API Key 与可选的 Base URL）。</div>
    <div class="field"><label>厂商名称</label><input id="npName" placeholder="如 myvendor" /></div>
    <div class="field"><label>Base URL（可选）</label><input id="npBase" placeholder="https://api.myvendor.com/v1" /></div>
    <div class="field"><label>API Key</label><input id="npKey" type="password" placeholder="粘贴 API Key" /></div>
    <div class="inline-btns">
      <button class="btn primary" id="npSave">创建厂商</button>
      <button class="btn ghost" id="npCancel">取消</button>
    </div>`;
  $('npCancel').onclick = renderGeneral;
  $('npSave').onclick = () => {
    const name = $('npName').value.trim();
    const base = $('npBase').value.trim();
    const key = $('npKey').value;
    if (!name){ toast('请输入厂商名称'); return; }
    fetch('/api/config/provider', { method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ name, api_base:base, api_key:key }) })
      .then(r => r.ok ? r.json() : Promise.reject(new Error('fail')))
      .then(() => { reloadModelsThen(() => selectProvider(name)); toast('已创建厂商 '+name); })
      .catch(() => toast('创建失败'));
  };
}
// Reload provider key + custom model data, then run a continuation.
async function reloadModelsThen(cb){
  await Promise.all([loadKeysData(), loadCustomModelsData()]);
  renderProviderNav();
  if (cb) cb();
  refreshModels();
}
function saveSettings(){
  // Persist general settings only when the general pane is active.
  const sm = $('setModel');
  if (sm){
    const mm = MODELS.find(m => m.id === sm.value);
    if (mm && mm.provider) state.provider = mm.provider;
    state.model = sm.value;
    state.theme = $('setTheme').value;
    document.querySelectorAll('#setModes .mode-opt').forEach(o => { if (o.classList.contains('sel')) state.mode = o.dataset.mode; });
    applyTheme(state.theme);
    fetch('/api/permission/mode', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ mode: state.mode }) }).catch(()=>{});
    fetch('/api/config', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({
      language: $('setLang').value,
      defaults: { model: state.model, provider: state.provider, mode: state.mode },
      tui: { theme: state.theme }
    })}).then(() => currentLang = $('setLang').value).catch(()=>{});
    updateContext();
  }
  $('settingsModal').classList.remove('show');
}
// Refresh the global MODELS list after a model change.
async function refreshModels(){
  try {
    const d = await (await fetch('/api/models')).json();
    if (Array.isArray(d)){ MODELS = d; }
    else if (Array.isArray(d.models)){ MODELS = d.models; }
    if (!MODELS.find(m => m.id === state.model) && MODELS[0]) state.model = MODELS[0].id;
    const provSet = {}; MODELS.forEach(m => provSet[m.provider] = true);
    PROVIDERS = Object.keys(provSet).map(p => ({ name:p, label: PROVIDER_LABELS[p]||p }));
  } catch(e) {}
}
let _toastEl;
function toast(msg){
  if (!_toastEl){ _toastEl = document.createElement('div'); _toastEl.className = 'toast'; document.body.appendChild(_toastEl); }
  _toastEl.textContent = msg; _toastEl.classList.add('show');
  clearTimeout(_toastEl._t); _toastEl._t = setTimeout(() => _toastEl.classList.remove('show'), 2200);
}

// ── Theme ──
function applyTheme(t){
  if (t === 'auto'){ const m = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'; document.documentElement.setAttribute('data-theme', m); }
  else document.documentElement.setAttribute('data-theme', t);
}

// ── Autocomplete ──
let acItems = [], acIdx = 0;
function showAC(){
  const v = $('input').value;
  const pop = $('acPop');
  if (v.startsWith('/')){
    acItems = SLASH.filter(s => s.k.startsWith(v.split(' ')[0]));
  } else if (v.startsWith('@')){
    acItems = PROVIDERS.map(p => ({ k: '@'+p.name, d: p.label })).filter(s => s.k.startsWith(v));
  } else { pop.classList.remove('show'); return; }
  if (!acItems.length){ pop.classList.remove('show'); return; }
  acIdx = 0;
  pop.innerHTML = acItems.map((it,i) => `<div class="ac-item ${i===0?'active':''}" data-i="${i}"><span class="k">${esc(it.k)}</span><span class="d">${esc(it.d||'')}</span></div>`).join('');
  pop.querySelectorAll('.ac-item').forEach(el => el.onclick = () => pickAC(+el.dataset.i));
  pop.classList.add('show');
}
function pickAC(i){
  const it = acItems[i]; if (!it) return;
  $('input').value = it.k + ' '; autoGrow(); $('acPop').classList.remove('show'); $('input').focus();
}

// ── Input handlers ──
function autoGrow(){ const ta = $('input'); ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 140) + 'px'; }
$('input').addEventListener('input', () => { autoGrow(); showAC(); });
$('input').addEventListener('keydown', e => {
  const pop = $('acPop');
  if (pop.classList.contains('show')){
    if (e.key === 'ArrowDown'){ e.preventDefault(); acIdx = (acIdx+1)%acItems.length; renderAC(); return; }
    if (e.key === 'ArrowUp'){ e.preventDefault(); acIdx = (acIdx-1+acItems.length)%acItems.length; renderAC(); return; }
    if (e.key === 'Tab' || (e.key === 'Enter' && !e.shiftKey)){ e.preventDefault(); pickAC(acIdx); return; }
    if (e.key === 'Escape'){ pop.classList.remove('show'); return; }
  }
  if (e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); send(); }
});
function renderAC(){ $('acPop').querySelectorAll('.ac-item').forEach((el,i) => el.classList.toggle('active', i===acIdx)); }

// ── Wiring ──
$('sendBtn').onclick = () => state.streaming ? stopChat() : send();
$('newChat').onclick = newSession;
$('sbNew').onclick = newSession;
$('openSettings').onclick = openSettings;
$('setCancel').onclick = () => $('settingsModal').classList.remove('show');
$('setSave').onclick = saveSettings;
$('addProviderBtn').onclick = () => selectProvider('__new__');
$('permAllow').onclick = () => respondPerm('allow');
$('permAll').onclick = () => respondPerm('allow_all');
$('permDeny').onclick = () => respondPerm('deny');
document.querySelectorAll('#setModes .mode-opt').forEach(o => o.onclick = () => {
  document.querySelectorAll('#setModes .mode-opt').forEach(x => x.classList.remove('sel')); o.classList.add('sel');
});
$('segModel').onclick = openModel;
$('segProvider').onclick = openProvider;
$('segMode').onclick = openSettings;
$('segTheme').onclick = () => {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  applyTheme(state.theme);
  const tt = $('segTheme'); if (tt) tt.textContent = state.theme === 'dark' ? '◐' : '◑';
  fetch('/api/config', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ tui: { theme: state.theme } }) }).catch(()=>{});
};
$('settingsModal').addEventListener('click', e => { if (e.target === $('settingsModal')) $('settingsModal').classList.remove('show'); });
$('permModal').addEventListener('click', e => { if (e.target === $('permModal')) $('permModal').classList.remove('show'); });

// ── Bootstrap ──
let currentLang = 'zh-CN';
async function boot(){
  applyTheme(state.theme);
  // config
  try {
    const cfg = await (await fetch('/api/config')).json();
    if (cfg.defaults && cfg.defaults.model) state.model = cfg.defaults.model;
    if (cfg.defaults && cfg.defaults.provider) state.provider = cfg.defaults.provider;
    if (cfg.defaults && cfg.defaults.mode) state.mode = cfg.defaults.mode;
    if (cfg.tui && cfg.tui.theme) state.theme = cfg.tui.theme;
    if (cfg.language) currentLang = cfg.language;
  } catch {}
  // models + providers
  try {
    const data = await (await fetch('/api/models')).json();
    MODELS = (data.models || data || []).map(m => ({ id:m.id, provider:m.provider, name:m.name||m.id, plan:m.plan||'', model_id: m.model_id || m.id, custom: !!m.custom }));
    if (!MODELS.find(m => m.id === state.model) && MODELS.length) state.model = MODELS[0].id;
    const provSet = {}; MODELS.forEach(m => provSet[m.provider] = true);
    const labels = { deepseek:'DeepSeek', zhipu:'Zhipu GLM', kimi:'Kimi K2', volcengine:'Doubao', tencent:'Hunyuan', huawei:'Pangu', scnet:'SCNET', openrouter:'OpenRouter', anthropic:'Anthropic' };
    PROVIDERS = Object.keys(provSet).map(p => ({ name:p, label: labels[p]||p }));
  } catch {}
  // connection
  fetch('/api/health').then(r => { $('stConn').textContent = r.ok ? '● 已连接' : '○ 离线'; $('stConn').style.color = r.ok ? 'var(--green)' : 'var(--red)'; })
    .catch(() => { $('stConn').textContent = '○ 离线'; $('stConn').style.color = 'var(--red)'; });
  // working directory (mirrors Reasonix status bar "workspace")
  fetch('/api/status').then(r => r.ok ? r.json() : null).then(d => { if (d && d.cwd){ state.cwd = d.cwd; updateContext(); } }).catch(()=>{});
  updateContext();
  // hide startup splash (LOGO) once the UI is ready
  setTimeout(() => { const sp = $('splash'); if (sp){ sp.classList.add('hide'); setTimeout(() => sp.remove(), 600); } }, 500);
  newSession();
  setInterval(async () => { try { const r = await fetch('/api/health'); $('stConn').textContent = r.ok?'● 已连接':'○ 离线'; $('stConn').style.color = r.ok?'var(--green)':'var(--red)'; } catch {} }, 15000);
}
boot();
</script>
