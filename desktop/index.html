<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iCode Desktop</title>
<style>
/* ── OKLCH design tokens (perceptually uniform) ── */
:root {
  --accent:        oklch(68% 0.16 38);
  --accent-soft:   oklch(68% 0.16 38 / 0.15);
  --reasoning:     oklch(72% 0.14 295);
  --green:         oklch(78% 0.16 150);
  --red:           oklch(68% 0.20 25);
  --yellow:        oklch(82% 0.13 85);
  --cyan:          oklch(80% 0.12 200);
  --purple:        oklch(75% 0.14 310);
  --radius: 8px;
  --speed: 0.16s;
}
:root[data-theme="dark"] {
  --bg-0: oklch(18% 0.01 260);
  --bg-1: oklch(21% 0.012 260);
  --bg-2: oklch(25% 0.014 260);
  --bg-3: oklch(30% 0.015 260);
  --border: oklch(35% 0.02 260);
  --text: oklch(92% 0.01 260);
  --text-mut: oklch(75% 0.02 260);
  --text-dim: oklch(60% 0.02 260);
  --shadow: 0 12px 40px oklch(0% 0 0 / 0.45);
}
:root[data-theme="light"] {
  --bg-0: oklch(98% 0.005 260);
  --bg-1: oklch(95% 0.008 260);
  --bg-2: oklch(90% 0.01 260);
  --bg-3: oklch(85% 0.012 260);
  --border: oklch(78% 0.014 260);
  --text: oklch(15% 0.01 260);
  --text-mut: oklch(35% 0.015 260);
  --text-dim: oklch(50% 0.015 260);
  --shadow: 0 8px 30px oklch(0% 0 0 / 0.08);
}
/* ── base reset ── */
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root {
  height: 100%;
  overflow: hidden;
  background: var(--bg-1);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
               "Microsoft YaHei", "Noto Sans SC", sans-serif;
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
/* ── alias OKLCH tokens → React component var names ── */
:root {
  --bg-primary:    var(--bg-1);
  --bg-secondary:  var(--bg-2);
  --bg-tertiary:   var(--bg-3);
  --text-primary:  var(--text);
  --text-secondary: var(--text-mut);
  --text-muted:    var(--text-dim);
  --border-color:  var(--border);
  --accent-hover:  var(--accent);
  --success:       var(--green);
  --warning:       var(--yellow);
  --error:         var(--red);
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
/* ── scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
/* ── utilities ── */
@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}
/* ── code blocks ── */
pre { overflow-x: auto; border-radius: 8px; }
code { font-family: "Cascadia Code", "JetBrains Mono", "Fira Code", monospace; font-size: 0.9em; }
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
