name: Build & Release

on:
  push:
    tags: ['v*']
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build
        run: go build -ldflags="-s -w -X main.Version=${{ github.ref_name }} -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ) -X main.GitCommit=${{ github.sha }}" -o icode${{ matrix.os == 'windows' && '.exe' || '' }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: icode-${{ matrix.os }}
          path: icode${{ matrix.os == 'windows' && '.exe' || '' }}

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: icode-*
          merge-multiple: true

      - name: Rename artifacts
        run: |
          mv icode-ubuntu-latest icode-linux-amd64
          mv icode-macos-latest icode-darwin-amd64
          mv icode-windows-latest icode-windows-amd64.exe
          chmod +x icode-*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            icode-linux-amd64
            icode-darwin-amd64
            icode-windows-amd64.exe
          generate_release_notes: true
